<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    
    <div class="form-section">

        <h1>Resume Builder</h1>

        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="name">
        </div>

        <div class="input-group">
            <label>Job Title</label>
            <input type="text" id="title">
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" id="email">
        </div>

        <div class="input-group">
            <label>Phone</label>
            <input type="text" id="phone">
        </div>

        <div class="input-group">
            <label>Address</label>
            <textarea id="address"></textarea>
        </div>

        <div class="input-group">
            <label>About Me</label>
            <textarea id="about"></textarea>
        </div>
        <div class="input-group">
            <label>Profile Photo</label>
            <input type="file" id="photo" accept="image/*">
        </div>
        <h2>Education</h2>

        <div id="education-container">
        <div class="education-item">
        <input type="text" class="college" placeholder="College">
        <input type="text" class="degree" placeholder="Degree">
        <input type="text" class="year" placeholder="Year">
        </div>
    </div>

        <button id="addEducation">+ Add Education</button>
        <h2>Experience</h2>

        <div id="experience-container">
        <div class="experience-item">
        <input type="text" class="company" placeholder="Company">
        <input type="text" class="position" placeholder="Position">
        <input type="text" class="expyear" placeholder="Years">
        </div>
        </div>

        <button id="addExperience">+ Add Experience</button>
        <h2>Skills</h2>

        <div class="input-group">
        <input type="text" id="skillInput" placeholder="HTML">
        <button id="addSkill">Add Skill</button>
        </div>

        <ul id="skillsList"></ul> 
        <button id="downloadPDF">Download PDF</button>

        <button id="darkMode">🌙 Dark Mode</button>
        <h2>Projects</h2>

        <div id="project-container">

        <div class="project-item">

        <input
        type="text"
        class="projectTitle"
        placeholder="Project Title">

        <textarea
        class="projectDesc"
        placeholder="Project Description"></textarea>

        </div>

        </div>

        <button id="addProject">
        + Add Project
        </button>
        <div class="section">

        <h2>Projects</h2>
        <div id="resumeProjects"></div>

        </div>
        <h2>Certifications</h2>

        <div id="certificate-container">

        <div class="certificate-item">

        <input
        type="text"
        class="certificateTitle"
        placeholder="Certificate Name">

        <input
        type="text"
        class="certificateOrg"
        placeholder="Organization">

        </div>

        </div>

        <button id="addCertificate">
        + Add Certificate
        </button>

        <h2>Social Links</h2>

        <div class="input-group">

        <label>GitHub</label>

        <input
        type="text"
        id="github"
        placeholder="https://github.com/username">

        </div>

        <div class="input-group">

        <label>LinkedIn</label>
        <input
        type="text"
        id="linkedin"
        placeholder="https://linkedin.com/in/username">

        </div>
        <button type="button" id="removePhoto">Remove Photo</button>


    </div>


    
    <div class="resume">

        <div class="header">

        <img id="profileImage"
        src="https://via.placeholder.com/150"
        alt="Profile">

        <h1 id="r-name">Your Name</h1>

        <h3 id="r-title">Job Title</h3>

        </div>
        <div class="contact">
            <p id="r-email">Email</p>
            <p id="r-phone">Phone</p>
            <p id="r-address">Address</p>
        </div>

        <hr>

        <div class="section">
            <h2>Profile</h2>
            <p id="r-about">
                Your profile will appear here.
            </p>
        </div>
        <div class="section">
        <h2>Education</h2>
        <div id="resumeEducation"></div>
        </div>

        <div class="section">
        <h2>Experience</h2>
        <div id="resumeExperience"></div>
        </div>

        <div class="section">
        <h2>Skills</h2>
        <ul id="resumeSkills"></ul>
        </div> 
    </div>

</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>

</body>
</html>
